name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: secret-fuse-linux-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            archive_name: secret-fuse-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: secret-fuse-macos-aarch64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install FUSE headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libfuse-dev pkg-config

      - name: Install macFUSE (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask macfuse

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/secret-fuse

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          staging="${{ matrix.archive_name }}-${version}"
          mkdir -p "$staging"
          cp target/${{ matrix.target }}/release/secret-fuse "$staging/"
          cp README.md "$staging/"
          [ -f LICENSE ] && cp LICENSE "$staging/" || true
          [ -d docs ] && cp -R docs "$staging/" || true
          tar czf "${staging}.tar.gz" "$staging"
          shasum -a 256 "${staging}.tar.gz" > "${staging}.tar.gz.sha256"
          echo "archive=${staging}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${staging}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive_name }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
